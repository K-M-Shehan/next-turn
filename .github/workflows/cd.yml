name: CD (Deploy to Azure + Vercel)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      backend_artifact_run_id:
        description: "Run ID containing backend artifact for rollback deploy"
        required: true
        type: string
      backend_artifact_name:
        description: "Backend artifact name"
        required: false
        default: "backend-publish"
        type: string
      frontend_artifact_run_id:
        description: "Run ID containing frontend artifact for rollback deploy"
        required: true
        type: string
      frontend_artifact_name:
        description: "Frontend artifact name"
        required: false
        default: "frontend-dist"
        type: string

permissions:
  contents: read

jobs:
  regression-gate:
    name: Regression Gate (pre-main deploy)
    if: github.event_name == 'push'
    uses: ./.github/workflows/qa.yml
    secrets: inherit

  build-backend-artifact:
    name: Build Backend Artifact
    if: github.event_name == 'push'
    needs: regression-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ./src/NextTurn.API/NextTurn.API.csproj

      - name: Build
        run: dotnet build ./src/NextTurn.API/NextTurn.API.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish ./src/NextTurn.API/NextTurn.API.csproj -c Release -o publish

      - name: Zip publish output
        run: |
          cd publish
          zip -r ../publish.zip .
          cd ..

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: publish.zip

  build-frontend-artifact:
    name: Build Frontend Artifact
    if: github.event_name == 'push'
    needs: regression-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: src/web
        run: npm ci

      - name: Build
        working-directory: src/web
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/web/dist

  deploy-backend:
    name: Backend → Azure App Service
    if: github.event_name == 'push'
    needs: build-backend-artifact
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: .

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore projects for EF metadata
        run: |
          dotnet restore src/NextTurn.Infrastructure/NextTurn.Infrastructure.csproj
          dotnet restore src/NextTurn.API/NextTurn.API.csproj

      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Generate migration script
        run: |
          dotnet ef migrations script --idempotent \
            --project src/NextTurn.Infrastructure \
            --startup-project src/NextTurn.API \
            -o migrate.sql

      - name: Apply migrations to Azure SQL
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: migrate.sql
          arguments: "-b"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nextturn
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish.zip

  deploy-frontend:
    name: Frontend → Vercel
    if: github.event_name == 'push'
    needs: build-frontend-artifact
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" frontend-dist

  rollback-backend:
    name: Rollback Backend (Artifact Redeploy)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Download backend artifact from selected run
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ inputs.backend_artifact_run_id }}
          name: ${{ inputs.backend_artifact_name }}
          path: .

      - name: Deploy backend artifact to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nextturn
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish.zip

  rollback-frontend:
    name: Rollback Frontend (Artifact Redeploy)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Download frontend artifact from selected run
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ inputs.frontend_artifact_run_id }}
          name: ${{ inputs.frontend_artifact_name }}
          path: frontend-dist

      - name: Deploy frontend artifact to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" frontend-dist
