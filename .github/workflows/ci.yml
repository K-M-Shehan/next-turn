name: CI (.NET)

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NextTurn.slnx

      - name: Build
        run: dotnet build NextTurn.slnx --configuration Release --no-restore

      # ── Unit tests with coverlet XPlat coverage ───────────────────────────
      # Coverage is scoped to Domain + Application only (see coverlet.runsettings).
      # Infrastructure and API are covered by the integration test suite.
      - name: Run unit tests with coverage
        run: |
          dotnet test tests/NextTurn.UnitTests/NextTurn.UnitTests.csproj \
            --configuration Release \
            --no-build \
            --settings tests/NextTurn.UnitTests/coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=unit-tests.trx"

      # ── Report generation ─────────────────────────────────────────────────
      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          $HOME/.dotnet/tools/reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:"Html;Cobertura;Badges;MarkdownSummaryGithub;TextSummary"

      - name: Write coverage summary to job summary
        if: always()
        run: cat ./coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Build consolidated CI test report bundle
        if: always()
        run: |
          python3 - <<'PY'
          import glob
          import os
          import shutil
          import xml.etree.ElementTree as ET

          ns = {'trx': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}

          def safe_copy_glob(pattern: str, destination: str):
            os.makedirs(destination, exist_ok=True)
            for path in glob.glob(pattern, recursive=True):
              if os.path.isfile(path):
                shutil.copy2(path, os.path.join(destination, os.path.basename(path)))

          def parse_trx_totals(pattern: str):
            total = passed = failed = skipped = 0
            for path in glob.glob(pattern, recursive=True):
              try:
                root = ET.parse(path).getroot()
                counters = root.find('.//trx:ResultSummary/trx:Counters', ns)
                if counters is None:
                  continue
                total += int(counters.attrib.get('total', 0))
                passed += int(counters.attrib.get('passed', 0))
                failed += int(counters.attrib.get('failed', 0))
                skipped += int(counters.attrib.get('notExecuted', 0))
              except Exception:
                continue
            return total, passed, failed, skipped

          bundle_root = 'artifacts'
          unit_reports = os.path.join(bundle_root, 'test-reports', 'unit')
          unit_coverage = os.path.join(bundle_root, 'coverage', 'unit')
          summary_dir = os.path.join(bundle_root, 'test-reports', 'summary')

          safe_copy_glob('coverage/**/*.trx', unit_reports)
          if os.path.isdir('coverage/report'):
            shutil.copytree('coverage/report', unit_coverage, dirs_exist_ok=True)

          os.makedirs(summary_dir, exist_ok=True)
          summary_path = os.path.join(summary_dir, 'README.md')

          total, passed, failed, skipped = parse_trx_totals('coverage/**/*.trx')

          with open(summary_path, 'w', encoding='utf-8') as f:
            f.write('# CI Test Report Bundle\n\n')
            f.write('## Suite Status\n')
            f.write(f'- Unit Tests + Coverage Gate: ${{{{ job.status }}}}\n\n')
            f.write('## Parsed Totals\n')
            f.write(f'- Unit: total={total}, passed={passed}, failed={failed}, skipped={skipped}\n\n')
            f.write('## Included Directories\n')
            f.write('- artifacts/test-reports/unit\n')
            f.write('- artifacts/coverage/unit\n')
            f.write('- artifacts/test-reports/summary\n')

          print(f'Wrote consolidated summary: {summary_path}')
          PY

      # ── Artifact upload (always — visible even when gate fails) ───────────
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/report

      - name: Upload consolidated CI test report bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-test-report-bundle
          path: ./artifacts

      # ── Quality gate: ≥ 80% line coverage AND ≥ 80% branch coverage ──────
      - name: Enforce coverage threshold (>=80% line & branch)
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, sys

          tree = ET.parse("./coverage/report/Cobertura.xml")
          root = tree.getroot()

          line   = float(root.attrib["line-rate"])   * 100
          branch = float(root.attrib["branch-rate"]) * 100

          print(f"Line coverage:   {line:.1f}%")
          print(f"Branch coverage: {branch:.1f}%")

          failures = []
          if line < 80:
              failures.append(f"Line coverage {line:.1f}% is below the 80% minimum")
          if branch < 80:
              failures.append(f"Branch coverage {branch:.1f}% is below the 80% minimum")

          if failures:
              for msg in failures:
                  print(f"::error::{msg}")
              sys.exit(1)

          print("Coverage threshold met")
          EOF
